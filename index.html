<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Ryan Sands Photography</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    html, body {
        margin: 0 !important;
        padding: 0 !important;
        height: auto !important;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Poppins', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: transparent;
        color: #2d3748;
    }

    /* === HONEYPOT FIELD === */
    .honeypot-field {
        position: absolute;
        left: -9999px;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
        tabindex: -1;
    }

    /* — OUTER WRAPPER — */
    .form-container {
        width: 100%;
        max-width: 100%;
        margin: 0 auto;
        padding: 0;
    }

    /* — FORM CARD — */
    .right-panel {
        background: transparent;
        border-radius: 0;
        padding: 20px;
        box-shadow: none;
        border: none;
    }

    /* — FORM BODY — */
    .form-body {
        width: 100%;
        color: #2d3748;
    }

    .form-body h2 {
        color: #2d3748;
        margin-bottom: 8px;
        font-size: 1.5rem;
        line-height: 1.3;
        font-weight: 700;
        letter-spacing: -.01em;
    }

    .form-subtitle {
        font-size: 0.9rem;
        color: #888;
        margin-bottom: 28px;
        line-height: 1.5;
    }

    .form-section-divider {
        border: none;
        border-top: 1px solid #f0eeeb;
        margin: 32px 0;
    }

    /* — THANK YOU (hidden by default, shown after submit) — */
    .thank-you-wrapper {
        display: none;
    }

    .thank-you-wrapper.active {
        display: block;
    }

    /* — FORM FIELDS — */
    .form-group {
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        color: #6b5876;
        font-weight: 600;
        font-size: 0.9rem;
        letter-spacing: 0.02em;
    }

    .required { color: #d44aad; }

    .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
    }

    input,
    select,
    textarea {
        width: 100%;
        padding: 14px 20px;
        border: 2.5px solid #e8e0ec;
        border-radius: 24px;
        font-size: 0.95rem;
        font-family: inherit;
        transition: all 0.25s ease;
        background: #fff;
        height: 52px;
        line-height: 1.4;
        color: #3a2d40;
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        box-sizing: border-box;
    }

    input::placeholder,
    textarea::placeholder {
        color: #bfaec5;
        font-weight: 300;
    }

    input:hover,
    select:hover,
    textarea:hover {
        border-color: #d0c0d6;
        background: #fff;
    }

    input:focus,
    select:focus,
    textarea:focus {
        outline: none;
        border-color: #c09acc;
        background: #fff;
    }

    textarea {
        resize: vertical;
        min-height: 110px;
        height: auto;
        line-height: 1.6;
        border-radius: 20px;
    }

    /* — SELECT ARROW — */
    select {
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23a090a8' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 14px center;
        background-size: 16px;
        padding-right: 38px;
        color: #3a2d40;
    }

    select option {
        color: #3a2d40;
    }

    select:invalid,
    select option[value=""] {
        color: #bfaec5;
    }

    /* — FIELD ROW GRIDS — */
    .field-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 32px;
    }

    /* — CHECKBOX / RADIO ITEMS — */
    .checkbox-group {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 12px;
        margin-top: 12px;
    }

    .checkbox-item {
        display: flex;
        align-items: center;
        padding: 16px 20px;
        border: 2.5px solid #e8e0ec;
        border-radius: 24px;
        cursor: pointer;
        transition: all 0.25s ease;
        background: #fff;
        position: relative;
        font-size: 0.9rem;
        line-height: 1.4;
        color: #3a2d40;
    }

    .checkbox-item:hover {
        border-color: #d0c0d6;
        background: #fff;
    }

    .checkbox-item input[type="checkbox"],
    .checkbox-item input[type="radio"] {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
    }

    .custom-checkbox {
        width: 22px;
        height: 22px;
        border: 2px solid #d0c0d6;
        border-radius: 8px;
        margin-right: 14px;
        flex-shrink: 0;
        background: #fff;
        transition: all 0.25s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: bold;
        color: transparent;
        line-height: 1;
    }

    .checkbox-item.checked {
        border-color: #c09acc;
        background: #faf5fc;
        box-shadow: 0 0 0 3px rgba(192,154,204,.08);
    }

    .checkbox-item.checked .custom-checkbox {
        background: #c09acc;
        border-color: #c09acc;
        color: #fff;
    }

    .checkbox-item:hover .custom-checkbox {
        border-color: #c09acc;
    }

    .checkbox-item label {
        margin: 0;
        cursor: pointer;
        font-size: inherit;
        flex: 1;
        color: inherit;
        font-weight: 500;
        line-height: 1.4;
    }

    /* — INLINE CHECKBOX (no box) — */
    .pricing-checkbox-row {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .pricing-checkbox-row input[type="checkbox"] {
        width: 26px;
        height: 26px;
        border: 2.5px solid #e8e0ec;
        border-radius: 50%;
        background: #fff;
        cursor: pointer;
        flex-shrink: 0;
        transition: all 0.25s ease;
        padding: 0;
        position: relative;
    }

    .pricing-checkbox-row input[type="checkbox"]::after {
        content: '✓';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 16px;
        font-weight: 700;
        color: transparent;
        transition: color 0.2s ease;
        line-height: 1;
    }

    .pricing-checkbox-row input[type="checkbox"]:checked {
        background: #fff;
        border-color: #c09acc;
    }

    .pricing-checkbox-row input[type="checkbox"]:checked::after {
        color: #c09acc;
    }

    .inline-checkbox-label {
        margin: 0 !important;
        cursor: pointer;
        font-weight: 500;
        color: #3a2d40;
        font-size: 0.9rem;
    }

    /* — ACTION ROW: Checkbox + Button on same line — */
    .action-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        align-items: center;
        margin-top: 16px;
    }

    .action-row .button-group {
        margin-top: 0;
    }

    .action-row .form-btn {
        width: 100%;
    }

    /* — BUTTONS — */
    .button-group {
        display: flex;
        justify-content: space-between;
        margin-top: 36px;
        gap: 14px;
    }

    .form-btn {
        position: relative;
        padding: 14px 20px;
        border: 2px solid rgba(255, 255, 255, 0.7);
        border-radius: 999px;
        cursor: pointer;
        font-size: 1.05rem;
        font-weight: 700;
        transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        overflow: hidden;
        font-family: inherit;
        line-height: 1.2;
        text-align: center;
        letter-spacing: 0.02em;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.12);
    }

    .form-btn-primary {
        background: linear-gradient(135deg, #ff61d5 0%, #ff8de0 40%, #ff61d5 100%);
        color: #fff;
        box-shadow: 0 4px 15px rgba(255, 97, 213, 0.35);
    }

    .form-btn-primary::after {
        content: '';
        position: absolute;
        top: 0;
        right: 120%;
        width: 60%;
        height: 100%;
        background: linear-gradient(
            90deg,
            transparent,
            rgba(255, 255, 255, 0.45),
            transparent
        );
        transform: skewX(-20deg);
        transition: none;
        pointer-events: none;
    }

    .form-btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 22px rgba(255, 97, 213, 0.5);
        border-color: #fff;
    }

    .form-btn-primary:hover::after {
        animation: btn-shine 0.6s ease-out forwards;
    }

    @keyframes btn-shine {
        0%   { right: 120%; }
        100% { right: -60%; }
    }

    .form-btn-primary:active {
        transform: translateY(0);
        box-shadow: 0 2px 8px rgba(255, 97, 213, 0.3);
    }

    /* — THANK YOU — */
    .thank-you {
        text-align: center;
        padding: 48px 20px;
        position: relative;
        overflow: hidden;
    }

    .thank-you h2 {
        color: #667eea;
        margin-bottom: 20px;
        font-size: 2rem;
        line-height: 1.2;
        font-weight: 700;
        text-align: center;
    }

    .thank-you p {
        color: #666;
        font-size: 1rem;
        line-height: 1.7;
        max-width: 420px;
        margin: 0 auto 30px auto;
    }

    .celebration-animation {
        position: relative;
        margin: 24px 0;
        height: 100px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .dancing-camera {
        font-size: 3em;
        animation: dance 2s ease-in-out infinite;
        margin: 0 20px;
    }

    @keyframes dance {
        0%, 100% { transform: translateY(0) rotate(-5deg); }
        25% { transform: translateY(-10px) rotate(5deg); }
        50% { transform: translateY(-5px) rotate(-3deg); }
        75% { transform: translateY(-15px) rotate(3deg); }
    }

    .floating-hearts {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        height: 100%;
        pointer-events: none;
    }

    .floating-heart {
        position: absolute;
        color: #ff6b6b;
        font-size: 1.5em;
        animation: float-up 3s ease-out infinite;
        opacity: 0;
    }

    .floating-heart:nth-child(1) { left: 20%; animation-delay: 0s; }
    .floating-heart:nth-child(2) { left: 40%; animation-delay: 0.5s; }
    .floating-heart:nth-child(3) { left: 60%; animation-delay: 1s; }
    .floating-heart:nth-child(4) { left: 80%; animation-delay: 1.5s; }
    .floating-heart:nth-child(5) { left: 30%; animation-delay: 2s; }
    .floating-heart:nth-child(6) { left: 70%; animation-delay: 2.5s; }

    @keyframes float-up {
        0%   { transform: translateY(50px) scale(0); opacity: 0; }
        10%  { opacity: 1; }
        90%  { opacity: 1; }
        100% { transform: translateY(-100px) scale(1.2); opacity: 0; }
    }

    .confetti {
        position: absolute;
        width: 100%;
        height: 100%;
        pointer-events: none;
    }

    .confetti-piece {
        position: absolute;
        width: 8px;
        height: 8px;
        background: #667eea;
        border-radius: 2px;
        animation: confetti-fall 3s linear infinite;
        opacity: 0;
    }

    .confetti-piece:nth-child(odd)  { background: #ff6b6b; border-radius: 50%; }
    .confetti-piece:nth-child(3n)   { background: #4ecdc4; }
    .confetti-piece:nth-child(4n)   { background: #ffd93d; border-radius: 50%; }

    @keyframes confetti-fall {
        0%   { transform: translateY(-100px) rotate(0deg);   opacity: 1; }
        100% { transform: translateY(200px) rotate(720deg); opacity: 0; }
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
        .form-container {
            padding: 0;
        }

        .right-panel {
            padding: 16px;
            border-radius: 0;
        }

        .form-body h2 {
            font-size: 1.3rem;
        }

        .form-subtitle {
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        .field-row {
            grid-template-columns: 1fr;
            gap: 0;
        }

        .action-row {
            grid-template-columns: 1fr;
            gap: 12px;
        }

        input,
        select,
        textarea {
            padding: 12px 16px;
            font-size: 16px;
            height: 48px;
            border-radius: 20px;
        }

        textarea {
            min-height: 100px;
            border-radius: 16px;
        }

        .checkbox-group {
            grid-template-columns: 1fr !important;
            gap: 10px;
        }

        .checkbox-item {
            padding: 14px 16px;
            font-size: 0.88rem;
            border-radius: 20px;
            height: auto;
            white-space: normal;
        }

        .button-group {
            margin-top: 24px;
        }

        .form-btn {
            padding: 16px 20px;
            font-size: 1rem;
            width: auto;
            border-radius: 999px;
        }

        .thank-you {
            padding: 36px 10px;
        }

        .thank-you h2 {
            font-size: 1.6rem;
        }
    }

    @media (max-width: 360px) {
        .right-panel {
            padding: 12px;
        }
    }
</style>
</head>
<body>

<div class="form-container" id="contact-form-root">
    <section class="right-panel" id="formPanel">

        <form class="form-body" id="contactForm" action="https://formspree.io/f/mrbldqya" method="POST">
            <input type="hidden" name="_subject" value="New Photography Inquiry">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" id="formLoadedAt" value="">

            <!-- HONEYPOT FIELD - Hidden from humans, visible to bots -->
            <div class="honeypot-field" aria-hidden="true">
                <label for="website">Website</label>
                <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
            </div>


            <!-- ROW 1: Service + Full Name -->
            <div class="field-row">
                <div class="form-group">
                    <label for="service" class="sr-only">Photography Service</label>
                    <select id="service" name="service" required="">
                        <option value="">Photography Service *</option>
                        <option value="wedding-photography">Wedding Photography</option>
                        <option value="engagement-session">Engagement Session</option>
                        <option value="photo-booth">Photo Booth</option>
                        <option value="family-portrait">Family Portrait</option>
                        <option value="proposal">Proposal</option>
                        <option value="rehearsal-dinner">Rehearsal Dinner Coverage</option>
                        <option value="maternity-session">Maternity Session</option>
                        <option value="baby-shower">Baby Shower</option>
                        <option value="bridal-shower">Bridal Shower</option>
                        <option value="bar-bat-mitzvah">Bar/Bat Mitzvah</option>
                        <option value="special-life-event">Special Life Event</option>
                        <option value="birthday-party">Birthday Party</option>
                        <option value="family-reunion">Family Reunion</option>
                        <option value="corporate-event">Corporate Event</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="fullName" class="sr-only">Full Name</label>
                    <input type="text" id="fullName" name="fullName" required="" placeholder="Full Name *">
                </div>
            </div>

            <div class="form-group" id="otherServiceGroup" style="display:none;">
                <label for="otherService" class="sr-only">Please specify</label>
                <input type="text" id="otherService" name="otherService" placeholder="Please specify">
            </div>

            <!-- ROW 2: Email + Phone -->
            <div class="field-row">
                <div class="form-group">
                    <label for="email" class="sr-only">Email</label>
                    <input type="email" id="email" name="email" required="" placeholder="Email *">
                </div>
                <div class="form-group">
                    <label for="phone" class="sr-only">Phone</label>
                    <input type="tel" id="phone" name="phone" required="" placeholder="Phone *">
                </div>
            </div>

            <!-- ROW 3: Message (full width) -->
            <div class="form-group">
                <label for="message" class="sr-only">How can I be of service?</label>
                <textarea id="message" name="message" placeholder="How can I be of service? Tell me about your event, date, or ideas."></textarea>
            </div>

            <!-- ROW 4: Checkbox + Button on same line -->
            <div class="action-row">
                <div class="pricing-checkbox-row">
                    <input type="checkbox" id="requestPricing" name="requestPricing" value="yes">
                    <label for="requestPricing" class="inline-checkbox-label">Please send me your full price list</label>
                </div>
                <div class="button-group">
                    <button type="submit" class="form-btn form-btn-primary" id="submitButton">
                        Send My Inquiry
                    </button>
                </div>
            </div>
        </form>

        <!-- THANK YOU (shown after submit) -->
        <div class="thank-you-wrapper" id="thankYouWrapper">
            <div class="thank-you">
                <div class="floating-hearts">
                    <div class="floating-heart">💕</div>
                    <div class="floating-heart">💖</div>
                    <div class="floating-heart">💕</div>
                    <div class="floating-heart">💖</div>
                    <div class="floating-heart">💕</div>
                    <div class="floating-heart">💖</div>
                </div>
                <div class="confetti">
                    <div class="confetti-piece" style="left:10%;animation-delay:0s;"></div>
                    <div class="confetti-piece" style="left:20%;animation-delay:0.2s;"></div>
                    <div class="confetti-piece" style="left:30%;animation-delay:0.4s;"></div>
                    <div class="confetti-piece" style="left:40%;animation-delay:0.6s;"></div>
                    <div class="confetti-piece" style="left:50%;animation-delay:0.8s;"></div>
                    <div class="confetti-piece" style="left:60%;animation-delay:1s;"></div>
                    <div class="confetti-piece" style="left:70%;animation-delay:1.2s;"></div>
                    <div class="confetti-piece" style="left:80%;animation-delay:1.4s;"></div>
                    <div class="confetti-piece" style="left:90%;animation-delay:1.6s;"></div>
                    <div class="confetti-piece" style="left:15%;animation-delay:1.8s;"></div>
                    <div class="confetti-piece" style="left:35%;animation-delay:2s;"></div>
                    <div class="confetti-piece" style="left:55%;animation-delay:2.2s;"></div>
                    <div class="confetti-piece" style="left:75%;animation-delay:2.4s;"></div>
                    <div class="confetti-piece" style="left:85%;animation-delay:2.6s;"></div>
                </div>

                <h2>Thank You!</h2>

                <div class="celebration-animation">
                    <div class="dancing-camera">📸</div>
                </div>

                <p>Hi 👋🏻 I've received your message and I'm really excited to hear from you! I'll reply as soon as I see your email. Looking forward to connecting!</p>
            </div>
        </div>
    </section>
</div>

<script>
    // Record when the form loaded - used for time-based spam check
    document.getElementById('formLoadedAt').value = Date.now();

    document.getElementById('service').addEventListener('change', function(e) {
        var otherGroup = document.getElementById('otherServiceGroup');
        if (e.target.value === 'other') {
            otherGroup.style.display = 'block';
        } else {
            otherGroup.style.display = 'none';
        }
    });

    // Auto-format phone number as user types: 908-335-4847
    document.getElementById('phone').addEventListener('input', function() {
        var digits = this.value.replace(/\D/g, '').substring(0, 10);
        if (digits.length > 6) {
            this.value = digits.substring(0, 3) + '-' + digits.substring(3, 6) + '-' + digits.substring(6);
        } else if (digits.length > 3) {
            this.value = digits.substring(0, 3) + '-' + digits.substring(3);
        } else {
            this.value = digits;
        }
    });

    // Custom checkbox click handler
    function handleCheckboxClick(event) {
        event.preventDefault();
        event.stopPropagation();

        var item = event.target.closest('.checkbox-item');
        if (!item) return;

        var input = item.querySelector('input[type="checkbox"], input[type="radio"]');
        var customCheckbox = item.querySelector('.custom-checkbox');

        if (input.type === 'radio') {
            var radioName = input.name;
            var allRadios = document.querySelectorAll('input[name="' + radioName + '"]');

            allRadios.forEach(function(radio) {
                var radioItem = radio.closest('.checkbox-item');
                var radioCustom = radioItem.querySelector('.custom-checkbox');
                radioItem.classList.remove('checked');
                radioCustom.textContent = '';
                radio.checked = false;
            });

            input.checked = true;
            item.classList.add('checked');
            customCheckbox.textContent = '✓';
        } else {
            input.checked = !input.checked;

            if (input.checked) {
                item.classList.add('checked');
                customCheckbox.textContent = '✓';
            } else {
                item.classList.remove('checked');
                customCheckbox.textContent = '';
            }
        }
    }

    function handleFormSubmit(e) {
        e.preventDefault();
        e.stopPropagation();

        var form = document.getElementById('contactForm');
        if (!form) return false;

        // HONEYPOT SPAM CHECK - Check FIRST before sending anything
        var honeypot = document.getElementById('website').value;
        if (honeypot && honeypot.trim() !== '') {
            // Silently reject spam - bot filled the honeypot field
            console.log('Spam blocked - honeypot triggered');
            // Show fake success to confuse bots
            form.style.display = 'none';
            var thankYou = document.getElementById('thankYouWrapper');
            if (thankYou) thankYou.classList.add('active');
            return false;
        }

        // TIME-BASED SPAM CHECK - No human can fill this form in under 3 seconds
        var loadedAt = parseInt(document.getElementById('formLoadedAt').value, 10);
        var elapsed = Date.now() - loadedAt;
        if (elapsed < 3000) {
            // Silently reject spam - submitted too fast
            console.log('Spam blocked - submitted in ' + elapsed + 'ms');
            form.style.display = 'none';
            var thankYou = document.getElementById('thankYouWrapper');
            if (thankYou) thankYou.classList.add('active');
            return false;
        }

        // Validate required fields
        var requiredFields = form.querySelectorAll('input[required], select[required]');
        for (var i = 0; i < requiredFields.length; i++) {
            if (!requiredFields[i].value.trim()) {
                requiredFields[i].focus();
                requiredFields[i].style.borderColor = '#e74c3c';
                setTimeout(function() {
                    requiredFields[i].style.borderColor = '#e8e0ec';
                }, 3000);
                return false;
            }
        }

        var btn = document.getElementById('submitButton');
        if (btn) {
            btn.textContent = 'Sending...';
            btn.disabled = true;
        }

        var formData = new FormData(form);

        fetch(form.action, {
            method: 'POST',
            body: formData,
            headers: {
                'Accept': 'application/json'
            }
        }).then(function(response) {
            if (response.ok) {
                form.style.display = 'none';
                var thankYou = document.getElementById('thankYouWrapper');
                if (thankYou) {
                    thankYou.classList.add('active');
                }

                setTimeout(function() {
                    var panel = document.getElementById('formPanel');
                    if (panel) {
                        var y = panel.getBoundingClientRect().top + window.pageYOffset - 150;
                        window.scrollTo({
                            top: y,
                            behavior: 'smooth'
                        });
                    }
                }, 200);

                // Reset load time for spam check
                document.getElementById('formLoadedAt').value = Date.now();
            } else {
                alert('Oops! There was a problem submitting your form. Please try again.');
                if (btn) {
                    btn.textContent = 'Send My Inquiry';
                    btn.disabled = false;
                }
            }
        }).catch(function(error) {
            alert('Oops! There was a problem submitting your form. Please try again.');
            if (btn) {
                btn.textContent = 'Send My Inquiry';
                btn.disabled = false;
            }
        });

        return false;
    }

    document.addEventListener('DOMContentLoaded', function() {
        var checkboxItems = document.querySelectorAll('.checkbox-item');
        checkboxItems.forEach(function(item) {
            item.addEventListener('click', handleCheckboxClick);
            item.addEventListener('touchend', handleCheckboxClick);
        });

        var form = document.getElementById('contactForm');
        if (form) {
            form.addEventListener('submit', handleFormSubmit);
        }
    });

    /* =============================================
       IFRAME HEIGHT COMMUNICATION (for Showit embed)
       ============================================= */
    function sendHeight() {
        var root = document.getElementById('contact-form-root');
        root.style.height = 'auto';
        document.body.style.height = 'auto';
        document.documentElement.style.height = 'auto';
        void root.offsetHeight;
        var h = Math.max(root.scrollHeight, root.offsetHeight, document.body.scrollHeight);
        h = Math.ceil(h);
        window.parent.postMessage({calcHeight: h}, '*');
    }
    window.addEventListener('load', function() {
        sendHeight();
        setInterval(sendHeight, 300);
        var observer = new MutationObserver(function() { setTimeout(sendHeight, 0); });
        observer.observe(document.getElementById('contact-form-root'), {childList: true, subtree: true});
    });
</script>

</body>
</html>
